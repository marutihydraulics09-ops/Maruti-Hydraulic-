<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Security Meta Tags -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://images.unsplash.com; connect-src 'self' ws: wss:; frame-src 'self' https://maps.google.com https://www.google.com;" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

  <link rel="icon" type="image/png" href="/MH.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maruti Hydraulics | Heavy Duty Hydraulic Cylinders & Power Packs</title>

  <!-- Start Single Page Apps for GitHub Pages -->
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script checks to see if a redirect is present in the query string,
    // converts it back into the correct url and adds it to the
    // browser's history using window.history.replaceState.
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>
  <!-- End Single Page Apps for GitHub Pages -->

  <style>
    /* Instant background setup to prevent white screen flash */
    html, body {
      background-color: #080A0E;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    /* Preloader container overlay */
    .preloader-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #080A0E;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* Engineering Blueprint Grid Background */
    .preloader-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, rgba(255, 107, 0, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 107, 0, 0.03) 1px, transparent 1px);
      opacity: 0.85;
      pointer-events: none;
    }

    .preloader-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 10;
    }

    .logo-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
    }

    .preloader-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      z-index: 2;
      animation: pulse-logo 2s infinite ease-in-out;
    }

    /* Double ring spinning tech indicator */
    .spinner {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: rgba(255, 107, 0, 0.1);
      border-bottom-color: rgba(255, 107, 0, 0.1);
      animation: spin 3s linear infinite;
    }

    .spinner::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      bottom: 6px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-left-color: #FF6B00;
      border-right-color: #FF6B00;
      animation: spin-reverse 1.5s linear infinite;
      filter: drop-shadow(0 0 8px rgba(255, 107, 0, 0.5));
    }

    .spinner::after {
      content: '';
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      bottom: 16px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: rgba(0, 194, 255, 0.3);
      border-bottom-color: #00c2ff;
      animation: spin 1s linear infinite;
      filter: drop-shadow(0 0 6px rgba(0, 194, 255, 0.5));
    }

    .preloader-title {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #FFFFFF;
      margin: 0 0 16px 0;
      text-transform: uppercase;
      text-indent: 0.3em;
      background: linear-gradient(135deg, #FFFFFF 30%, rgba(255, 255, 255, 0.75));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    .loading-bar-container {
      width: 140px;
      height: 3px;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
      position: relative;
    }

    .loading-bar {
      position: absolute;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, #FF6B00, #00c2ff);
      border-radius: 10px;
      animation: loading-slide 1.8s infinite ease-in-out;
      box-shadow: 0 0 8px rgba(255, 107, 0, 0.4);
    }

    .preloader-subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.45);
      margin: 0;
      text-transform: uppercase;
      font-weight: 500;
      animation: pulse-text 1.5s infinite ease-in-out;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pulse-logo {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 10px rgba(255, 107, 0, 0.2)); }
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.85; }
    }

    @keyframes loading-slide {
      0% { left: -60%; }
      50% { left: 100%; }
      100% { left: -60%; }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Preloader HTML - will be replaced when React mounts -->
    <div class="preloader-container">
      <div class="preloader-grid"></div>
      <div class="preloader-content">
        <div class="logo-wrapper">
          <div class="spinner"></div>
          <img src="/MH.png" class="preloader-logo" alt="Maruti Hydraulics" />
        </div>
        <h1 class="preloader-title">MARUTI HYDRAULICS</h1>
        <div class="loading-bar-container">
          <div class="loading-bar"></div>
        </div>
        <p class="preloader-subtitle">Loading System...</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
